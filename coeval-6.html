<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EGADE Loop — Evaluación entre pares</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Source+Serif+4:wght@600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#fff;font-family:'Outfit',sans-serif;color:#111}
.wrap{max-width:660px;margin:0 auto;padding:32px 20px 60px}
.h1{font-family:'Source Serif 4',serif;font-size:26px;font-weight:700;letter-spacing:-.02em;margin-bottom:4px;color:#111}
.h2{font-family:'Source Serif 4',serif;font-size:20px;font-weight:700;margin-bottom:12px;color:#111}
.sub{color:#999;font-size:13px;margin:0}
.label{display:block;font-size:11px;font-weight:700;color:#999;margin-bottom:5px;text-transform:uppercase;letter-spacing:.6px}
.inp{width:100%;padding:11px 14px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:14px;font-family:'Outfit',sans-serif;color:#111;background:#fafafa;outline:none;transition:border-color .2s}
.inp:focus{border-color:#111}.inp.err{border-color:#c62828;background:#fef5f5}
textarea.inp{resize:vertical;min-height:48px}
.card{background:#fff;border-radius:12px;border:1.5px solid #e5e5e5;padding:22px 24px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.03)}
.card-hover{cursor:pointer;transition:border-color .2s,box-shadow .2s;text-align:center}
.card-hover:hover{border-color:#111;box-shadow:0 4px 16px rgba(0,0,0,.07)}
.btn-black{padding:13px 28px;background:#111;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;transition:opacity .2s}
.btn-black:hover{opacity:.85}.btn-black:disabled{opacity:.35;cursor:default}.btn-black.full{width:100%}
.btn-outline{padding:12px 24px;background:none;border:1.5px solid #ddd;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;color:#555;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn-outline:hover{border-color:#999;color:#222}
#fixed-logo{position:fixed;top:12px;right:16px;z-index:998;opacity:1;transition:opacity .2s;pointer-events:none}#fixed-logo img{height:36px;display:block}#fixed-logo.hidden{opacity:0;pointer-events:none}
.lang-toggle{position:fixed;top:14px;left:16px;background:#f5f5f5;border:1.5px solid #ddd;border-radius:20px;padding:5px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;color:#555;z-index:999;transition:all .2s}.lang-toggle:hover{background:#111;color:#fff;border-color:#111}
.btn-back{background:none;border:none;color:#aaa;font-size:13px;cursor:pointer;font-family:'Outfit',sans-serif;margin-bottom:20px;padding:0;transition:color .15s;display:inline-flex;align-items:center;gap:4px}
.btn-back:hover{color:#555}
.btn-dashed{width:100%;padding:11px;background:none;border:1.5px dashed #ddd;border-radius:8px;color:#aaa;font-size:14px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s;margin-bottom:20px}
.btn-dashed:hover{border-color:#111;color:#111}
.btn-remove{background:none;border:none;color:#ccc;cursor:pointer;font-size:18px;transition:color .15s}
.btn-remove:hover{color:#c62828}
.btn-sm{padding:7px 16px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif}
.stars{display:flex;gap:1px;align-items:center}
.star-btn{background:none;border:none;cursor:pointer;font-size:23px;padding:2px 1px;line-height:1;color:#ddd;transition:color .1s,transform .1s}
.star-btn.on{color:#b89a3d;transform:scale(1.15)}
.star-val{font-size:11px;color:#aaa;margin-left:6px;font-weight:700}
.crit-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-radius:8px;flex-wrap:wrap;gap:8px;background:#fafafa;margin-bottom:5px;transition:background .2s}
.crit-row.err{background:#fef5f5}
.crit-label{font-size:13px;color:#444;flex:1;min-width:150px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px}
.flex-center{display:flex;justify-content:center;align-items:center}
.text-center{text-align:center}
.hidden{display:none!important}
.tabs{display:flex;background:#f5f5f5;border-radius:8px;overflow:hidden}
.tab-btn{padding:9px 18px;border:none;background:transparent;color:#999;font-size:13px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.tab-btn.active{background:#111;color:#fff}
.tab-btn svg{width:14px;height:14px}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.stat-card{background:#fafafa;border-radius:10px;padding:14px;text-align:center;border:1px solid #eee}
.stat-val{font-size:24px;font-weight:800;font-family:'Source Serif 4',serif;color:#111}
.stat-lbl{font-size:11px;color:#999;text-transform:uppercase;letter-spacing:.5px}
.instbox{background:#fafafa;border-radius:10px;padding:16px 20px;margin-bottom:24px;border-left:3px solid #111;font-size:14px;color:#555;line-height:1.6}
.badge{padding:3px 12px;border-radius:20px;font-size:13px;font-weight:700;display:inline-block}
.badge-g{background:#f0f0f0;color:#222}.badge-y{background:#f7f5ed;color:#8a7a3a}.badge-r{background:#fef5f5;color:#c62828}
.tag{background:#f5f5f5;padding:3px 8px;border-radius:5px;font-size:11px;color:#777;display:inline-block;margin:2px}
.confirm-bar{background:#fef5f5;border-radius:10px;padding:14px 20px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.err-box{background:#fef5f5;border-radius:8px;padding:10px 16px;margin-bottom:14px;color:#c62828;font-size:13px}
.success-circle{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.prof-banner{background:#fafafa;border-radius:10px;padding:14px 20px;margin-bottom:20px;display:flex;align-items:center;gap:14px;border:1px solid #eee}
.prof-avatar{width:44px;height:44px;min-width:44px;min-height:44px;aspect-ratio:1/1;border-radius:50%;background:#111;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0;overflow:hidden}
.credential-box{background:#fafafa;border:1.5px solid #ddd;border-radius:12px;padding:24px;margin:20px 0}
.credential-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #eee}
.credential-row:last-child{border-bottom:none}
.credential-label{font-size:12px;color:#999;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.credential-value{font-weight:700;font-size:15px;color:#111}
.email-banner{background:#f5f5f5;border:1.5px solid #ddd;border-radius:10px;padding:14px 20px;margin:16px 0;display:flex;align-items:center;gap:10px;font-size:14px;color:#555}
.send-email-box{background:#fafafa;border:1.5px solid #e0e0e0;border-radius:12px;padding:20px 24px;margin-bottom:20px}
.send-email-box .status{margin-top:12px;padding:10px 16px;border-radius:8px;font-size:13px;font-weight:600}
.ico{display:inline-flex;align-items:center;vertical-align:middle}
.ico svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ico-sm svg{width:14px;height:14px}
.ico-lg svg{width:24px;height:24px}
.ico-xl svg{width:32px;height:32px}
.stat-card .ico svg{width:20px;height:20px;color:#999}
@media(max-width:600px){.row2{grid-template-columns:1fr}.stats-grid{grid-template-columns:1fr}.crit-row{flex-direction:column;align-items:flex-start}.prof-banner{flex-direction:column;text-align:center}}
</style>
</head>

function buildCSV(res,crit){var h=['Fecha','Hora','Evaluador','Equipo','Evaluado'].concat(crit.map(function(c){return c.label})).concat(['Promedio','Comentarios']);var rows=[];res.forEach(function(r){r.evaluations.forEach(function(ev){var sc=crit.map(function(c){return ev.scores[c.id]||''});var nums=sc.filter(function(s){return typeof s==='number'});var avg=nums.length?(nums.reduce(function(a,b){return a+b},0)/nums.length).toFixed(2):'';var d=new Date(r.timestamp);rows.push([d.toLocaleDateString('es-MX'),d.toLocaleTimeString('es-MX'),'"'+r.evaluatorName+'"','"'+r.groupName+'"','"'+ev.peerName+'"'].concat(sc).concat([avg,'"'+(ev.comment||'').replace(/"/g,'""')+'"']).join(','))})});return h.join(',')+'\n'+rows.join('\n')}
function downloadCSV(res,crit,title){var a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+buildCSV(res,crit)],{type:'text/csv;charset=utf-8;'}));a.download=(title||'coeval').replace(/\s+/g,'_')+'_'+new Date().toISOString().slice(0,10)+'.csv';a.click()}

function sendWebhook(payload,cb){
  if(!EMAIL_WEBHOOK||EMAIL_WEBHOOK==='PEGAR_URL_AQUI'){if(cb)cb(false,'webhook_not_configured');return}
  var url;
  if(payload.type==='form_created'){
    url=EMAIL_WEBHOOK
      +'?action=form_created'
      +'&code='+encodeURIComponent(payload.code)
      +'&profName='+encodeURIComponent(payload.profName)
      +'&courseName='+encodeURIComponent(payload.courseName)
      +'&profEmail='+encodeURIComponent(payload.profEmail)
      +'&password='+encodeURIComponent(payload.password)
      +'&title='+encodeURIComponent(payload.title)
      +'&studentUrl='+encodeURIComponent(payload.studentUrl)
      +'&createdAt='+payload.createdAt
      +'&criteria='+encodeURIComponent((payload.criteria||[]).map(function(c){return c.label}).join(' | '))
      +'&lang='+encodeURIComponent(LANG||'es');
  }else if(payload.type==='response'){
    url=EMAIL_WEBHOOK+'?action=response&data='+encodeURIComponent(JSON.stringify(payload));
  }else{return}
  fetch(url,{mode:'no-cors'})
    .then(function(){if(cb)cb(true)})
    .catch(function(){if(cb)cb(false,'network_error')});
}

  ].join('\n');

    'Ingresa al panel de resultados con tu código y contraseña.',
    '',
    '— EGADE Loop | Plataforma de evaluación entre pares',
    '  Tecnológico de Monterrey – EGADE'
  ].join('\n');

    ? blockEN+'\n\n'+divider+'\n\n'+blockES

function buildP(cfg){var ct=document.getElementById('pc');ct.innerHTML='';peers.forEach(function(peer,idx){

      var h='<div class="send-email-box"><p style="font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px">'+ico('mail','ico-sm')+' Enviar resultados por correo</p><div style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap"><div style="flex:1;min-width:200px"><label class="label">Correo del destinatario</label><input class="inp" id="send-email" value="'+esc(cfg.profEmail||'')+'" placeholder="'+t('emailPh')+'"></div><button class="btn-black" id="send-results" style="padding:12px 24px;white-space:nowrap;display:flex;align-items:center;gap:6px" '+(fil.length?'':'disabled')+'>'+ico('send','ico-sm')+' Enviar</button></div><div id="send-status"></div>'+(fil.length?'':'<p style="font-size:12px;color:#aaa;margin-top:8px">'+t('noResultsTxt')+'</p>')+'</div>';
      h+='<div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center"><button class="btn-outline" id="dl" style="padding:10px 20px" '+(fil.length?'':'disabled')+'>'+ico('download','ico-sm')+' Descargar resultados en Excel</button><button class="btn-outline" id="rf" style="padding:10px 16px">'+ico('refresh','ico-sm')+' Actualizar</button><button class="btn-outline" id="clr" style="padding:10px 16px;'+(res.length?'color:#c62828;border-color:#c62828':'color:#ddd;border-color:#eee')+'" '+(res.length?'':'disabled')+'>'+ico('trash','ico-sm')+' Eliminar</button>';
      if(grps.length>1){h+='<select id="fgs" class="inp" style="width:auto;padding:10px 12px;font-size:13px"><option value="">Todos</option>';grps.forEach(function(g){h+='<option value="'+esc(g)+'" '+(fg===g?'selected':'')+'>'+esc(g)+'</option>'});h+='</select>'}h+='</div><div id="ca"></div>';
      if(aggKeys.length>0){h+='<h3 class="h2" style="font-size:17px;margin-top:8px">Resumen por evaluado</h3>';aggKeys.map(function(k){return agg[k]}).sort(function(a,b){var aa=cfg.criteria.reduce(function(s,c){return s+(a.scores[c.id]||0)},0)/(a.count*cfg.criteria.length);var bb=cfg.criteria.reduce(function(s,c){return s+(b.scores[c.id]||0)},0)/(b.count*cfg.criteria.length);return bb-aa}).forEach(function(p){var avg=cfg.criteria.reduce(function(s,c){return s+(p.scores[c.id]||0)},0)/(p.count*cfg.criteria.length);var bc=avg>=4?'badge-g':avg>=3?'badge-y':'badge-r';h+='<div class="card" style="padding:16px 20px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div><span style="font-weight:700;font-size:14px">'+esc(p.name)+'</span><span style="font-size:12px;color:#aaa;margin-left:8px">'+esc(p.group)+'</span></div><span class="badge '+bc+'">'+avg.toFixed(1)+'</span></div><div>';cfg.criteria.forEach(function(c){var ca=(p.scores[c.id]||0)/p.count;h+='<span class="tag">'+esc(c.label.slice(0,20))+'… <strong>'+ca.toFixed(1)+'</strong></span>'});h+='</div><div style="font-size:11px;color:#aaa;margin-top:4px">'+p.count+' eval.</div>';if(p.comments.length){h+='<div style="margin-top:8px;padding-top:8px;border-top:1px solid #f0f0f0">';p.comments.forEach(function(cm){h+='<div style="font-size:12px;color:#777;margin-bottom:3px"><span style="font-weight:600;color:#aaa">'+esc(cm.from)+':</span> <em>"'+esc(cm.text)+'"</em></div>'});h+='</div>'}h+='</div>'})}
      if(fil.length){h+='<h3 class="h2" style="font-size:17px;margin-top:20px">Detalle</h3>';fil.slice().reverse().forEach(function(r){h+='<div class="card" style="padding:14px 18px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-weight:700;font-size:14px">'+esc(r.evaluatorName)+'</span><span style="font-size:11px;color:#ccc">'+new Date(r.timestamp).toLocaleString('es-MX')+'</span></div><div style="font-size:12px;color:#aaa;margin-bottom:8px">'+esc(r.groupName)+'</div>';r.evaluations.forEach(function(ev){h+='<div style="background:#fafafa;border-radius:7px;padding:9px 12px;margin-bottom:4px"><div style="font-weight:600;font-size:13px;margin-bottom:2px">→ '+esc(ev.peerName)+'</div><div style="display:flex;gap:6px;flex-wrap:wrap;font-size:12px;color:#888">';cfg.criteria.forEach(function(c){h+='<span>'+esc(c.label.slice(0,14))+'…: <strong style="color:#444">'+(ev.scores[c.id]||'–')+'</strong></span>'});h+='</div>';if(ev.comment)h+='<div style="font-size:12px;color:#666;margin-top:3px;font-style:italic">"'+esc(ev.comment)+'"</div>';h+='</div>'});h+='</div>'})}else h+='<div class="text-center" style="padding:50px 20px;color:#ccc"><div style="margin-bottom:8px">'+ico('inbox','ico-xl')+'</div><p style="font-size:14px;color:#aaa">'+t('noResp')+'</p></div>';
      tc.innerHTML=h;
      var sendBtn=document.getElementById('send-results');if(sendBtn)sendBtn.addEventListener('click',function(){var emailTo=document.getElementById('send-email').value.trim(),statusDiv=document.getElementById('send-status');if(!emailTo||!emailTo.includes('@')){document.getElementById('send-email').classList.add('err');statusDiv.innerHTML='<div class="status" style="background:#fef5f5;color:#c62828">Ingresa un correo válido</div>';return}document.getElementById('send-email').classList.remove('err');sendBtn.disabled=true;sendBtn.innerHTML=ico('send','ico-sm')+' Enviando…';statusDiv.innerHTML='<div class="status" style="background:#f5f5f5;color:#555">Enviando resultados…</div>';sendResultsEmail(emailTo,cfg.profName||'',cfg.courseName||'',code,buildCSV(fil,cfg.criteria),fil.length,tot,aggKeys.length,function(ok,reason){if(ok){statusDiv.innerHTML='<div class="status" style="background:#f0f0f0;color:#333">'+ico('checkCircle','ico-sm')+' Resultados enviados a <strong>'+esc(emailTo)+'</strong></div>';sendBtn.innerHTML=ico('check','ico-sm')+' Enviado';setTimeout(function(){sendBtn.innerHTML=ico('send','ico-sm')+' Enviar';sendBtn.disabled=false},4000)}else if(reason==='webhook_not_configured'){statusDiv.innerHTML='<div class="status" style="background:#f7f5ed;color:#8a7a3a">'+ico('alertCircle','ico-sm')+' Webhook no configurado.</div>';sendBtn.innerHTML=ico('send','ico-sm')+' Enviar';sendBtn.disabled=false}else{statusDiv.innerHTML='<div class="status" style="background:#fef5f5;color:#c62828">'+ico('xCircle','ico-sm')+' Error al enviar.</div>';sendBtn.innerHTML=ico('send','ico-sm')+' Reintentar';sendBtn.disabled=false}})});
      var dlBtn=document.getElementById('dl');if(dlBtn)dlBtn.addEventListener('click',function(){downloadCSV(fil,cfg.criteria,cfg.title)});
      var rfBtn=document.getElementById('rf');if(rfBtn)rfBtn.addEventListener('click',draw);
      var fgSel=document.getElementById('fgs');if(fgSel)fgSel.addEventListener('change',function(){fg=this.value;draw()});
      var clrBtn=document.getElementById('clr');if(clrBtn)clrBtn.addEventListener('click',function(){document.getElementById('ca').innerHTML='<div class="confirm-bar"><span style="font-size:13px;color:#c62828">¿Eliminar todas las respuestas?</span><div style="display:flex;gap:8px"><button class="btn-sm" id="dc" style="background:#c62828;color:#fff">'+t('deleteBtn')+'</button><button class="btn-sm" id="xc" style="background:none;border:1px solid #ddd">Cancelar</button></div></div>';document.getElementById('dc').addEventListener('click',function(){fd.responses=[];saveForm(code,fd);draw()});document.getElementById('xc').addEventListener('click',function(){document.getElementById('ca').innerHTML=''})});

    }else if(tab==='config'){
      var crit=cfg.criteria.map(function(c){return{id:c.id,label:c.label}});
      tc.innerHTML='<div style="background:#fafafa;border-radius:12px;padding:20px 24px;margin-bottom:20px;border:1px solid #eee"><p style="font-size:12px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px;display:flex;align-items:center;gap:6px">'+ico('user','ico-sm')+' Profesor</p><div style="margin-bottom:14px"><label class="label">Nombre</label><input class="inp" id="xpn" value="'+esc(cfg.profName||'')+'"></div><div><label class="label">Correo institucional</label><input class="inp" id="xpe" value="'+esc(cfg.profEmail||'')+'"></div></div>'
        +'<div style="margin-bottom:16px"><label class="label">Curso</label><input class="inp" id="xcn" value="'+esc(cfg.courseName||'')+'"></div>'
        +'<div style="margin-bottom:16px"><label class="label">Título</label><input class="inp" id="xft" value="'+esc(cfg.title)+'"></div>'
        +'<div style="margin-bottom:16px"><label class="label">Instrucciones</label><textarea class="inp" id="xfi" rows="3">'+esc(cfg.instructions)+'</textarea></div>'
        +'<div style="margin-bottom:24px"><label class="label" style="margin-bottom:10px">'+t('criteriaLabel')+'</label><div id="xcc"></div><button class="btn-dashed" id="xac" style="margin-top:6px;margin-bottom:0;width:auto;padding:8px 14px;font-size:13px">'+ico('plus','ico-sm')+' '+t('addCrit')+'</button></div>'
        +'<button class="btn-black" id="xs">'+t('saveBtn')+'</button>';
      function rebX(){var d=document.getElementById('xcc');d.innerHTML='';crit.forEach(function(c,i){var row=document.createElement('div');row.style.cssText='display:flex;gap:8px;align-items:center;margin-bottom:8px';row.innerHTML='<span style="font-size:12px;color:#ccc;width:20px;text-align:center">'+(i+1)+'</span>';var inp=document.createElement('input');inp.className='inp';inp.style.flex='1';inp.value=c.label;inp.placeholder='Criterio…';(function(idx){inp.addEventListener('input',function(){crit[idx].label=this.value})})(i);row.appendChild(inp);if(crit.length>1){var rm=document.createElement('button');rm.className='btn-remove';rm.textContent='×';(function(idx){rm.addEventListener('click',function(){crit.splice(idx,1);rebX()})})(i);row.appendChild(rm)}d.appendChild(row)})}
      rebX();document.getElementById('xac').addEventListener('click',function(){crit.push({id:'c'+Date.now(),label:''});rebX()});
      document.getElementById('xs').addEventListener('click',function(){var clean=crit.filter(function(c){return c.label.trim()});fd.config=Object.assign({},cfg,{profName:document.getElementById('xpn').value.trim()||cfg.profName,profEmail:document.getElementById('xpe').value.trim()||cfg.profEmail,courseName:document.getElementById('xcn').value.trim()||cfg.courseName,title:document.getElementById('xft').value.trim()||cfg.title,instructions:document.getElementById('xfi').value.trim(),criteria:clean.length?clean:getDefaultCriteria()});saveForm(code,fd);var btn=document.getElementById('xs');btn.textContent=t('savedMsg');btn.style.background='#333';setTimeout(function(){btn.textContent=t('saveBtn');btn.style.background='#111'},2000)});
    }
  }draw();
}

(function(){var c=getUrlParam('code'),d=getUrlParam('d');history.replaceState(null,'',window.location.pathname);if(c){c=c.toUpperCase().trim();if(d&&!loadForm(c)){try{var cfg=JSON.parse(decodeURIComponent(atob(decodeURIComponent(d))));saveForm(c,{config:{title:cfg.t,courseName:cfg.c,profName:cfg.p,instructions:cfg.i,criteria:cfg.cr,profCode:''},responses:[],createdAt:Date.now()})}catch(ex){}}var f=loadForm(c);if(f){render('studentForm',{code:c,form:f});return}}render('langSelect');})();
</script>
