<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EGADE Loop — Evaluación entre pares</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Source+Serif+4:wght@600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#fff;font-family:'Outfit',sans-serif;color:#111}
.wrap{max-width:660px;margin:0 auto;padding:32px 20px 60px}
.h1{font-family:'Source Serif 4',serif;font-size:26px;font-weight:700;letter-spacing:-.02em;margin-bottom:4px;color:#111}
.h2{font-family:'Source Serif 4',serif;font-size:20px;font-weight:700;margin-bottom:12px;color:#111}
.sub{color:#999;font-size:13px;margin:0}
.label{display:block;font-size:11px;font-weight:700;color:#999;margin-bottom:5px;text-transform:uppercase;letter-spacing:.6px}
.inp{width:100%;padding:11px 14px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:14px;font-family:'Outfit',sans-serif;color:#111;background:#fafafa;outline:none;transition:border-color .2s}
.inp:focus{border-color:#111}.inp.err{border-color:#c62828;background:#fef5f5}
textarea.inp{resize:vertical;min-height:48px}
.card{background:#fff;border-radius:12px;border:1.5px solid #e5e5e5;padding:22px 24px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.03)}
.card-hover{cursor:pointer;transition:border-color .2s,box-shadow .2s;text-align:center}
.card-hover:hover{border-color:#111;box-shadow:0 4px 16px rgba(0,0,0,.07)}
.btn-black{padding:13px 28px;background:#111;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;transition:opacity .2s}
.btn-black:hover{opacity:.85}.btn-black:disabled{opacity:.35;cursor:default}.btn-black.full{width:100%}
.btn-outline{padding:12px 24px;background:none;border:1.5px solid #ddd;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;color:#555;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn-outline:hover{border-color:#999;color:#222}
#fixed-logo{position:fixed;top:12px;right:16px;z-index:998;opacity:1;transition:opacity .2s;pointer-events:none}#fixed-logo img{height:36px;display:block}#fixed-logo.hidden{opacity:0;pointer-events:none}
#sup-widget{position:fixed;bottom:20px;left:20px;z-index:1000}
#sup-btn{width:52px;height:52px;border-radius:50%;background:#111;color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.25);transition:transform .2s}
#sup-btn:hover{transform:scale(1.08)}
#sup-panel{position:absolute;bottom:64px;left:0;background:#fff;border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,.15);width:360px;max-width:calc(100vw - 40px);overflow:hidden;transition:opacity .2s,transform .2s}
#sup-panel.hidden{display:none}
.sup-hdr{display:flex;justify-content:space-between;align-items:flex-start;padding:16px 18px 12px;border-bottom:1px solid #f0f0f0}
.sup-ttl{font-weight:700;font-size:13.5px;color:#111;line-height:1.35;flex:1}
.sup-x{background:none;border:none;font-size:20px;cursor:pointer;color:#aaa;padding:0;line-height:1;margin-left:8px}.sup-x:hover{color:#111}
.sup-sub{font-size:13px;color:#666;padding:12px 18px 6px;margin:0}
.sup-body{padding:0 12px 14px}
.sup-card{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;background:#fff;border:1px solid #eee;border-radius:12px;margin-top:10px}
.sup-av{width:48px;height:48px;min-width:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex-shrink:0;overflow:hidden;background:#555}
.sup-av img{width:100%;height:100%;object-fit:cover}
.sup-info{flex:1;min-width:0}
.sup-name{font-weight:700;font-size:13px;color:#111;margin-bottom:2px}
.sup-role{font-size:12px;color:#777;line-height:1.35;margin-bottom:3px}
.sup-email{font-size:12px;color:#2563eb;text-decoration:none}.sup-email:hover{text-decoration:underline}
.sup-mail{flex-shrink:0;color:#666;display:flex;align-items:center;margin-top:2px}
.lang-toggle{position:fixed;top:14px;left:16px;background:#f5f5f5;border:1.5px solid #ddd;border-radius:20px;padding:5px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;color:#555;z-index:999;transition:all .2s}.lang-toggle:hover{background:#111;color:#fff;border-color:#111}
.btn-back{background:none;border:none;color:#aaa;font-size:13px;cursor:pointer;font-family:'Outfit',sans-serif;margin-bottom:20px;padding:0;transition:color .15s;display:inline-flex;align-items:center;gap:4px}
.btn-back:hover{color:#555}
.btn-dashed{width:100%;padding:11px;background:none;border:1.5px dashed #ddd;border-radius:8px;color:#aaa;font-size:14px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s;margin-bottom:20px}
.btn-dashed:hover{border-color:#111;color:#111}
.btn-remove{background:none;border:none;color:#ccc;cursor:pointer;font-size:18px;transition:color .15s}
.btn-remove:hover{color:#c62828}
.btn-sm{padding:7px 16px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif}
.stars{display:flex;gap:1px;align-items:center}
.star-btn{background:none;border:none;cursor:pointer;font-size:23px;padding:2px 1px;line-height:1;color:#ddd;transition:color .1s,transform .1s}
.star-btn.on{color:#b89a3d;transform:scale(1.15)}
.star-val{font-size:11px;color:#aaa;margin-left:6px;font-weight:700}
.crit-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-radius:8px;flex-wrap:wrap;gap:8px;background:#fafafa;margin-bottom:5px;transition:background .2s}
.crit-row.err{background:#fef5f5}
.crit-label{font-size:13px;color:#444;flex:1;min-width:150px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px}
.flex-center{display:flex;justify-content:center;align-items:center}
.text-center{text-align:center}
.hidden{display:none!important}
.tabs{display:flex;background:#f5f5f5;border-radius:8px;overflow:hidden}
.tab-btn{padding:9px 18px;border:none;background:transparent;color:#999;font-size:13px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.tab-btn.active{background:#111;color:#fff}
.tab-btn svg{width:14px;height:14px}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.stat-card{background:#fafafa;border-radius:10px;padding:14px;text-align:center;border:1px solid #eee}
.stat-val{font-size:24px;font-weight:800;font-family:'Source Serif 4',serif;color:#111}
.stat-lbl{font-size:11px;color:#999;text-transform:uppercase;letter-spacing:.5px}
.instbox{background:#fafafa;border-radius:10px;padding:16px 20px;margin-bottom:24px;border-left:3px solid #111;font-size:14px;color:#555;line-height:1.6}
.badge{padding:3px 12px;border-radius:20px;font-size:13px;font-weight:700;display:inline-block}
.badge-g{background:#f0f0f0;color:#222}.badge-y{background:#f7f5ed;color:#8a7a3a}.badge-r{background:#fef5f5;color:#c62828}
.tag{background:#f5f5f5;padding:3px 8px;border-radius:5px;font-size:11px;color:#777;display:inline-block;margin:2px}
.confirm-bar{background:#fef5f5;border-radius:10px;padding:14px 20px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.err-box{background:#fef5f5;border-radius:8px;padding:10px 16px;margin-bottom:14px;color:#c62828;font-size:13px}
.success-circle{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.prof-banner{background:#fafafa;border-radius:10px;padding:14px 20px;margin-bottom:20px;display:flex;align-items:center;gap:14px;border:1px solid #eee}
.prof-avatar{width:44px;height:44px;min-width:44px;min-height:44px;aspect-ratio:1/1;border-radius:50%;background:#111;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0;overflow:hidden}
.credential-box{background:#fafafa;border:1.5px solid #ddd;border-radius:12px;padding:24px;margin:20px 0}
.credential-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #eee}
.credential-row:last-child{border-bottom:none}
.credential-label{font-size:12px;color:#999;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.credential-value{font-weight:700;font-size:15px;color:#111}
.email-banner{background:#f5f5f5;border:1.5px solid #ddd;border-radius:10px;padding:14px 20px;margin:16px 0;display:flex;align-items:center;gap:10px;font-size:14px;color:#555}
.send-email-box{background:#fafafa;border:1.5px solid #e0e0e0;border-radius:12px;padding:20px 24px;margin-bottom:20px}
.send-email-box .status{margin-top:12px;padding:10px 16px;border-radius:8px;font-size:13px;font-weight:600}
.ico{display:inline-flex;align-items:center;vertical-align:middle}
.ico svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ico-sm svg{width:14px;height:14px}
.ico-lg svg{width:24px;height:24px}
.ico-xl svg{width:32px;height:32px}
.stat-card .ico svg{width:20px;height:20px;color:#999}
@media(max-width:600px){.row2{grid-template-columns:1fr}.stats-grid{grid-template-columns:1fr}.crit-row{flex-direction:column;align-items:flex-start}.prof-banner{flex-direction:column;text-align:center}}
</style>
</head>

function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function genCode(){var c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789',r='';for(var i=0;i<6;i++)r+=c[Math.floor(Math.random()*c.length)];return r}
function genPassword(){if(LANG==='en'){var a=['Blue','Red','Green','Solar','North','High','Light','Sea','Gold','Cloud'],b=['Oak','Tiger','Falcon','River','Mount','Sky','Beacon','Wind','Stone','Eagle'];return a[Math.floor(Math.random()*a.length)]+b[Math.floor(Math.random()*b.length)]+String(Math.floor(Math.random()*90)+10)}var a=['Azul','Rojo','Verde','Solar','Norte','Alto','Luz','Mar','Oro','Nube'],b=['Roble','Tigre','Halcon','Rio','Monte','Cielo','Faro','Viento','Piedra','Aguila'];return a[Math.floor(Math.random()*a.length)]+b[Math.floor(Math.random()*b.length)]+String(Math.floor(Math.random()*90)+10)}
function fmtDate(ts){return new Date(ts).toLocaleDateString('es-MX',{year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'})}
function getInitials(n){return(n||'??').split(' ').map(function(w){return w[0]}).slice(0,2).join('').toUpperCase()}
function loadForm(c){try{var d=localStorage.getItem('coeval:'+c);return d?JSON.parse(d):null}catch(e){return null}}

/* ═══ CSV ═══ */
function buildCSV(res,crit){var h=['Fecha','Hora','Evaluador','Equipo','Evaluado'].concat(crit.map(function(c){return c.label})).concat(['Promedio','Comentarios']);var rows=[];res.forEach(function(r){r.evaluations.forEach(function(ev){var sc=crit.map(function(c){return ev.scores[c.id]||''});var nums=sc.filter(function(s){return typeof s==='number'});var avg=nums.length?(nums.reduce(function(a,b){return a+b},0)/nums.length).toFixed(2):'';var d=new Date(r.timestamp);rows.push([d.toLocaleDateString('es-MX'),d.toLocaleTimeString('es-MX'),'"'+r.evaluatorName+'"','"'+r.groupName+'"','"'+ev.peerName+'"'].concat(sc).concat([avg,'"'+(ev.comment||'').replace(/"/g,'""')+'"']).join(','))})});return h.join(',')+'\n'+rows.join('\n')}
function downloadCSV(res,crit,title){var a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+buildCSV(res,crit)],{type:'text/csv;charset=utf-8;'}));a.download=(title||'coeval').replace(/\s+/g,'_')+'_'+new Date().toISOString().slice(0,10)+'.csv';a.click()}

/* ═══ WEBHOOK ═══ */
function sendWebhook(payload,cb){
  if(!EMAIL_WEBHOOK||EMAIL_WEBHOOK==='PEGAR_URL_AQUI'){if(cb)cb(false,'webhook_not_configured');return}
  var url;
  if(payload.type==='form_created'){
    url=EMAIL_WEBHOOK
      +'?action=form_created'
      +'&code='+encodeURIComponent(payload.code)
      +'&profName='+encodeURIComponent(payload.profName)
      +'&courseName='+encodeURIComponent(payload.courseName)
      +'&profEmail='+encodeURIComponent(payload.profEmail)
      +'&password='+encodeURIComponent(payload.password)
      +'&title='+encodeURIComponent(payload.title)
      +'&studentUrl='+encodeURIComponent(payload.studentUrl)
      +'&createdAt='+payload.createdAt
      +'&criteria='+encodeURIComponent((payload.criteria||[]).map(function(c){return c.label}).join(' | '))
      +'&lang='+encodeURIComponent(LANG||'es');
  }else if(payload.type==='response'){
    url=EMAIL_WEBHOOK+'?action=response&data='+encodeURIComponent(JSON.stringify(payload));
  }else{return}
  fetch(url,{mode:'no-cors'})
    .then(function(){if(cb)cb(true)})
    .catch(function(){if(cb)cb(false,'network_error')});
}

function createStars(val,onChange){var w=document.createElement('div');w.className='stars';w.dataset.val=val||0;var vs=document.createElement('span');vs.className='star-val';vs.textContent=val?val+'/5':'';for(var i=1;i<=5;i++){(function(s){var b=document.createElement('button');b.type='button';b.className='star-btn'+(s<=val?' on':'');b.textContent='★';b.addEventListener('mouseenter',function(){w.querySelectorAll('.star-btn').forEach(function(x,j){x.classList.toggle('on',j<s)})});b.addEventListener('mouseleave',function(){var cur=parseInt(w.dataset.val)||0;w.querySelectorAll('.star-btn').forEach(function(x,j){x.classList.toggle('on',j<cur)})});b.addEventListener('click',function(){w.dataset.val=s;w.querySelectorAll('.star-btn').forEach(function(x,j){x.classList.toggle('on',j<s)});vs.textContent=s+'/5';onChange(s)});w.appendChild(b)})(i)}w.appendChild(vs);return w}

/* ═══ SUPPORT WIDGET ═══ */
function updateSupportLang(){
  var isEN=LANG==='en';
  var el;
  el=document.getElementById('sup-ttl');if(el)el.textContent=isEN?'EGADE Academic Development Office':'Dirección de Desarrollo Académico EGADE';
  el=document.getElementById('sup-sub');if(el)el.textContent=isEN?'For support or questions about EGADE Loop:':'Para soporte o dudas sobre EGADE Loop:';
  el=document.getElementById('sup-role1');if(el)el.textContent=isEN?'Academic Development Director EGADE':'Directora de Desarrollo Académico EGADE';
  el=document.getElementById('sup-name2');if(el)el.textContent='CC: Stephanie Angellic Romero Romero';
  el=document.getElementById('sup-role2');if(el)el.textContent=isEN?'Teaching Practices Specialist':'Especialista en Prácticas de Enseñanza';
}
document.getElementById('sup-btn').addEventListener('click',function(){var p=document.getElementById('sup-panel');p.classList.toggle('hidden');if(!p.classList.contains('hidden'))updateSupportLang()});
document.getElementById('sup-close').addEventListener('click',function(){document.getElementById('sup-panel').classList.add('hidden')});

/* ═══ INIT ═══ */
(function(){var c=getUrlParam('code'),d=getUrlParam('d');history.replaceState(null,'',window.location.pathname);if(c){c=c.toUpperCase().trim();if(d&&!loadForm(c)){try{var cfg=JSON.parse(decodeURIComponent(atob(decodeURIComponent(d))));saveForm(c,{config:{title:cfg.t,courseName:cfg.c,profName:cfg.p,instructions:cfg.i,criteria:cfg.cr,profCode:''},responses:[],createdAt:Date.now()})}catch(ex){}}var f=loadForm(c);if(f){render('studentForm',{code:c,form:f});return}}render('langSelect');})();
</script>
